<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro a Taller</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6">Registro a Taller</h1>

    <form id="registroForm" class="space-y-4">
      <div>
        <label for="nombre" class="block font-medium">Nombre completo</label>
        <input id="nombre" type="text" class="w-full border rounded-lg p-2">
      </div>

      <div>
        <label for="correo" class="block font-medium">Correo electrónico</label>
        <input id="correo" type="email" class="w-full border rounded-lg p-2">
      </div>

      <div>
        <label for="curso" class="block font-medium">Curso de interés</label>
        <select id="curso" class="w-full border rounded-lg p-2">
          <option value="">Seleccione un curso</option>
          <option value="html">HTML y CSS</option>
          <option value="js">JavaScript Básico</option>
          <option value="ui">Pruebas de UI</option>
        </select>
      </div>

      <button id="btnEnviar" type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg">
        Enviar
      </button>
    </form>

    <p id="mensaje" class="mt-4 text-center font-medium"></p>
  </div>

  <script>
    const form = document.getElementById("registroForm");
    const mensaje = document.getElementById("mensaje");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const nombre = document.getElementById("nombre").value.trim();
      const correo = document.getElementById("correo").value.trim();
      const curso = document.getElementById("curso").value;

      mensaje.className = "mt-4 text-center font-medium";

      if (!nombre || !correo || !curso) {
        mensaje.textContent = "Todos los campos son obligatorios.";
        mensaje.classList.add("text-red-600");
        return;
      }

      const correoValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!correoValido.test(correo)) {
        mensaje.textContent = "El correo electrónico no es válido.";
        mensaje.classList.add("text-red-600");
        return;
      }

      mensaje.textContent = "Registro enviado correctamente.";
      mensaje.classList.add("text-green-600");
      form.reset();
    });
  </script>
</body>
</html>
